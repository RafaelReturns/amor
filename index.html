<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <!-- Mobile First, optimized for iPhone 15 and scalable -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haley</title>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-bg: #000000;
            --color-text: #f0f0f0;
            --font-serif: 'Playfair Display', serif;
            --font-display: 'Cinzel', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            font-family: var(--font-serif);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Layer - Text Overlay Container */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas handler */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Text Styles */
        .text-element {
            position: absolute;
            opacity: 0; /* Hidden by default, GSAP handles fading */
            text-align: center;
            width: 90%;
            max-width: 600px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            will-change: opacity, transform;
        }

        .scene1-quote {
            bottom: 12%;
            font-family: var(--font-serif);
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 400;
            line-height: 1.5;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.95);
        }

        .scene2-top {
            top: 15%;
            font-family: var(--font-serif);
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.03em;
        }

        .scene2-bottom {
            bottom: 10%;
            font-family: var(--font-serif);
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 400;
            font-style: italic;
            line-height: 2.2;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.05em;
        }

        /* Loading state to hide flash of unstyled content */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.5);
            font-family: var(--font-sans);
            font-weight: 300;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div id="loader">YÜKLƏNİR...</div>

    <!-- WebGL/Canvas Particle System -->
    <canvas id="stage"></canvas>

    <!-- UI Overlay for Texts -->
    <div class="ui-layer">
        <div id="scene1-text" class="text-element scene1-quote">
            Bu ulduzların işığı sönənə qədər səni sevəcəyəm.
        </div>
        
        <div id="scene2-text" class="text-element scene2-top">
            Gözlərin elə parlayır ki, sanki içində bir ulduz gizlənib.<br>
            Onlara baxdıqca insan özünü başqa dünyada hiss edir.
        </div>
        
        <div id="scene2-quote" class="text-element scene2-bottom">
            when the power of love,<br>
            beats the love of power,<br>
            the world knows the peace
        </div>
    </div>

    <!-- GSAP for Cinematic Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        /**
         * Elite Particle System & Interactive Scene Manager
         * Optimized for Mobile (iPhone 15) @ 60 FPS
         */
        
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency behind canvas
        
        let width, height, cx, cy;
        const dpr = window.devicePixelRatio || 1;
        
        // System Configuration
        const config = {
            particleCount: window.innerWidth < 600 ? 3500 : 5000, // Adaptive count
            friction: 0.92,
            wanderFriction: 0.98,
            maxSpeedSeek: 3.5,
            maxSpeedWander: 0.4,
            imagePath: '/assets/Gemini_Generated_Image_nu5gimnu5gimnu5g.png'
        };

        // State Machine
        let state = 0; 
        // 0 = Wander, 1 = Heart/Name, 2 = Explode/Wait, 3 = Image Build
        let heartbeat = { scale: 1 };
        
        // Arrays
        let particles = [];
        let heartTargets = [];
        let textTargets = [];
        let imageTargets = [];

        // Track time for natural movements
        let time = 0;

        class Particle {
            constructor() {
                this.resetWander();
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                
                this.size = Math.random() * 1.2 + 0.3; // Tiny sizes
                this.baseAlpha = Math.random() * 0.5 + 0.1;
                this.alpha = this.baseAlpha;
                this.flickerSpeed = Math.random() * 0.05 + 0.01;
                this.flickerOffset = Math.random() * Math.PI * 2;
                
                // Color defaults to white/glow
                this.r = 255;
                this.g = 255;
                this.b = 255;
                
                // Targets
                this.tr = 255;
                this.tg = 255;
                this.tb = 255;
                this.tx = 0;
                this.ty = 0;
                
                this.isHeart = false; // Flag to apply heartbeat scale
            }
            
            resetWander() {
                this.wanderAngle = Math.random() * Math.PI * 2;
                this.wanderSpeed = Math.random() * 0.05 + 0.01;
                this.wanderRadius = Math.random() * 1.5 + 0.5;
            }

            update(currentState) {
                // Subtle flicker
                this.alpha = this.baseAlpha + Math.sin(time * this.flickerSpeed + this.flickerOffset) * 0.2;
                if (this.alpha < 0) this.alpha = 0;

                if (currentState === 0) {
                    // Wander Mode
                    this.wanderAngle += (Math.random() - 0.5) * 0.2;
                    this.vx += Math.cos(this.wanderAngle) * this.wanderSpeed;
                    this.vy += Math.sin(this.wanderAngle) * this.wanderSpeed;
                    
                    this.vx *= config.wanderFriction;
                    this.vy *= config.wanderFriction;
                    
                    this.x += this.vx;
                    this.y += this.vy;

                    // Soft boundary wrap
                    if (this.x < -10) this.x = width + 10;
                    if (this.x > width + 10) this.x = -10;
                    if (this.y < -10) this.y = height + 10;
                    if (this.y > height + 10) this.y = -10;
                    
                    // Keep colors white
                    this.r = 255; this.g = 255; this.b = 255;

                } else if (currentState === 1 || currentState === 3) {
                    // Seek Mode (Heart/Text or Image)
                    
                    // Color transition
                    this.r += (this.tr - this.r) * 0.05;
                    this.g += (this.tg - this.g) * 0.05;
                    this.b += (this.tb - this.b) * 0.05;

                    let targetX = this.tx;
                    let targetY = this.ty;

                    // Apply Heartbeat scale ONLY to heart particles in Scene 1
                    if (currentState === 1 && this.isHeart) {
                        targetX = cx + (this.tx - cx) * heartbeat.scale;
                        targetY = cy + (this.ty - cy) * heartbeat.scale;
                    }

                    // Calculate steering
                    let dx = targetX - this.x;
                    let dy = targetY - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // Cinematic arrival easing
                    let speed = config.maxSpeedSeek;
                    let force = 0.08;
                    
                    if (currentState === 3) {
                        // Slower, more ethereal formation for the image
                        speed = 1.5;
                        force = 0.03;
                    }

                    if (dist < 150) {
                        speed = (dist / 150) * speed;
                        if (speed < 0.1) speed = 0.1;
                    }

                    if (dist > 0.5) {
                        let forceX = (dx / dist) * speed - this.vx;
                        let forceY = (dy / dist) * speed - this.vy;
                        
                        this.vx += forceX * force;
                        this.vy += forceY * force;
                    }
                    
                    this.vx *= config.friction;
                    this.vy *= config.friction;
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // Add subtle floating even when at target in Scene 3
                    if (currentState === 3 && dist < 2) {
                        this.x += (Math.random() - 0.5) * 0.2;
                        this.y += (Math.random() - 0.5) * 0.2;
                    }
                } else if (currentState === 2) {
                    // Exploding Mode
                    this.vx *= 0.96;
                    this.vy *= 0.96;
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // Lerp color back to white
                    this.r += (255 - this.r) * 0.1;
                    this.g += (255 - this.g) * 0.1;
                    this.b += (255 - this.b) * 0.1;
                }
            }

            draw() {
                // Optimization: using fillRect instead of arc for massive perf boost on mobile
                ctx.fillStyle = `rgba(${this.r | 0}, ${this.g | 0}, ${this.b | 0}, ${this.alpha})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // --- Target Generation Functions ---

        function generateHeartAndTextTargets() {
            heartTargets = [];
            textTargets = [];
            
            // 1. Generate 'Haley' Text Targets via Offscreen Canvas
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
            const tw = 400, th = 200;
            tCanvas.width = tw;
            tCanvas.height = th;
            
            tCtx.fillStyle = '#fff';
            tCtx.font = '600 70px Cinzel';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText('Haley', tw / 2, th / 2);
            
            const textData = tCtx.getImageData(0, 0, tw, th).data;
            let tempTextPoints = [];
            
            for (let y = 0; y < th; y += 2) {
                for (let x = 0; x < tw; x += 2) {
                    let alpha = textData[(y * tw + x) * 4 + 3];
                    if (alpha > 128) {
                        tempTextPoints.push({
                            x: x - tw/2 + cx,
                            y: y - th/2 + cy
                        });
                    }
                }
            }
            
            // 2. Generate Heart Targets (Parametric Equation)
            // Scale appropriately for mobile
            const heartScale = window.innerWidth < 400 ? 11 : 13;
            let tempHeartPoints = [];
            
            for (let t = 0; t < Math.PI * 2; t += 0.02) {
                // x = 16 sin^3(t)
                let hx = 16 * Math.pow(Math.sin(t), 3);
                // y = 13 cos(t) - 5 cos(2t) - 2 cos(3t) - cos(4t)
                let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                // Add volume/thickness to the heart so it's not just a line
                for(let v = 0; v < 6; v++) {
                    let offsetX = (Math.random() - 0.5) * 8;
                    let offsetY = (Math.random() - 0.5) * 8;
                    tempHeartPoints.push({
                        x: hx * heartScale + cx + offsetX,
                        y: (hy * heartScale + cy) - 20 + offsetY // Shift up slightly
                    });
                }
            }
            
            // 3. Distribute particles to targets
            // Allocate ~800 to text, rest to heart
            const textParticleCount = Math.min(800, Math.floor(particles.length * 0.25));
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                if (i < textParticleCount) {
                    let tgt = tempTextPoints[Math.floor(Math.random() * tempTextPoints.length)];
                    p.tx = tgt.x;
                    p.ty = tgt.y;
                    p.isHeart = false;
                } else {
                    let tgt = tempHeartPoints[Math.floor(Math.random() * tempHeartPoints.length)];
                    p.tx = tgt.x;
                    p.ty = tgt.y;
                    p.isHeart = true;
                }
                p.tr = 255; p.tg = 255; p.tb = 255;
            }
        }

        // Generate target coordinates based on uploaded Image
        function processImageTargets(imgElement) {
            const iCanvas = document.createElement('canvas');
            const iCtx = iCanvas.getContext('2d', { willReadFrequently: true });
            
            // Determine sizing to fit nicely in the center (max 80% width, max 40% height)
            const maxW = width * 0.8;
            const maxH = height * 0.45;
            let iw = imgElement.width;
            let ih = imgElement.height;
            let scale = Math.min(maxW / iw, maxH / ih);
            
            iw = Math.floor(iw * scale);
            ih = Math.floor(ih * scale);
            
            iCanvas.width = iw;
            iCanvas.height = ih;
            iCtx.drawImage(imgElement, 0, 0, iw, ih);
            
            const imgData = iCtx.getImageData(0, 0, iw, ih).data;
            let validPoints = [];
            
            // Y offset to put image centrally, slightly above the quote
            const startX = cx - iw/2;
            const startY = cy - ih/2;
            
            // Scan pixels
            // Step size optimizes processing and density
            const step = window.innerWidth < 600 ? 2 : 3; 
            
            for (let y = 0; y < ih; y += step) {
                for (let x = 0; x < iw; x += step) {
                    let idx = (y * iw + x) * 4;
                    let r = imgData[idx];
                    let g = imgData[idx+1];
                    let b = imgData[idx+2];
                    let a = imgData[idx+3];
                    
                    if (a > 20) {
                        // Calculate brightness
                        let brightness = (r + g + b) / 3;
                        // Higher probability of adding a particle if pixel is bright
                        let probability = (brightness / 255) * 0.8 + 0.2; 
                        
                        if (Math.random() < probability) {
                            validPoints.push({
                                x: startX + x,
                                y: startY + y,
                                r: r,
                                g: g,
                                b: b
                            });
                        }
                    }
                }
            }
            
            // If the image was totally black/transparent or empty, fallback
            if (validPoints.length === 0) {
                console.warn("No valid pixels found in image. Creating fallback galaxy.");
                createFallbackGalaxyTargets();
                return;
            }
            
            // Assign particles to image points
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let pt = validPoints[Math.floor(Math.random() * validPoints.length)];
                
                // Add slight jitter for a more organic, painted look
                p.tx = pt.x + (Math.random() - 0.5) * 2;
                p.ty = pt.y + (Math.random() - 0.5) * 2;
                p.tr = pt.r;
                p.tg = pt.g;
                p.tb = pt.b;
                p.isHeart = false;
            }
        }

        // Fallback if image doesn't load to avoid breaking the experience
        function createFallbackGalaxyTargets() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * Math.min(width, height) * 0.3;
                // Spiral clustering
                let spiralOffset = radius * 0.05;
                p.tx = cx + Math.cos(angle + spiralOffset) * radius;
                p.ty = cy + Math.sin(angle + spiralOffset) * radius * 0.7; // Elliptical
                
                // Subtle blue/purple tint for fallback
                p.tr = 200 + Math.random() * 55;
                p.tg = 200 + Math.random() * 55;
                p.tb = 255;
                p.isHeart = false;
            }
        }

        // --- Core Application Logic & Scene Management ---

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            cx = width / 2;
            cy = height / 2;
        }

        function render() {
            // Soft clearing for motion blur effect natively
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // Trail length
            ctx.fillRect(0, 0, width, height);
            
            // Additive blending for gorgeous glowing overlaps
            ctx.globalCompositeOperation = 'screen';
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(state);
                particles[i].draw();
            }
            
            time += 1;
            requestAnimationFrame(render);
        }

        // Initialize GSAP Timelines
        let heartbeatTween;

        function startScene1() {
            state = 1;
            generateHeartAndTextTargets();
            
            // UI Transition
            gsap.to('#scene1-text', { opacity: 1, duration: 3, ease: 'power2.inOut', delay: 1 });
            
            // Start heartbeat animation
            heartbeatTween = gsap.to(heartbeat, {
                scale: 1.06,
                duration: 0.9,
                ease: 'power1.inOut',
                yoyo: true,
                repeat: -1
            });
        }

        function triggerExplosion() {
            state = 2; // Explode
            if (heartbeatTween) heartbeatTween.kill();
            
            // UI Transition
            gsap.to('#scene1-text', { opacity: 0, duration: 1.5, ease: 'power2.out' });
            
            // Apply massive outward force
            particles.forEach(p => {
                let dx = p.x - cx;
                let dy = p.y - cy;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                let force = (Math.random() * 25 + 15);
                
                p.vx = (dx / dist) * force;
                p.vy = (dy / dist) * force;
                p.resetWander(); // Prepare for wandering afterwards
            });
            
            // After 2.5s, transition to Scene 3
            setTimeout(startScene3, 2500);
        }

        function startScene3() {
            // Start fading in top text
            gsap.to('#scene2-text', { opacity: 1, duration: 3, ease: 'power2.inOut' });
            
            // Load and process image
            const img = new Image();
            img.crossOrigin = "Anonymous"; // In case served from different domain
            img.onload = () => {
                processImageTargets(img);
                state = 3; // Seek image targets
                
                // 5 seconds after formation starts, show final quote
                setTimeout(() => {
                    gsap.to('#scene2-quote', { opacity: 1, y: -10, duration: 4, ease: 'power2.out' });
                }, 5000);
            };
            img.onerror = () => {
                console.warn("Could not load /assets/photo.jpg. Proceeding with fallback visualization.");
                createFallbackGalaxyTargets();
                state = 3;
                setTimeout(() => {
                    gsap.to('#scene2-quote', { opacity: 1, y: -10, duration: 4, ease: 'power2.out' });
                }, 5000);
            };
            img.src = config.imagePath;
        }

        // --- Interaction Handling ---
        let clickCount = 0;
        
        function handleInteraction() {
            if (clickCount === 0) {
                startScene1();
            } else if (clickCount === 1) {
                triggerExplosion();
            }
            clickCount++;
        }

        window.addEventListener('pointerdown', handleInteraction);
        window.addEventListener('resize', () => {
            resize();
            // Re-center targets if in a static state
            if (state === 1) generateHeartAndTextTargets();
            // Image targets would need re-parsing, but for simplicity we let them stay or re-center roughly
            if (state === 3) {
                 particles.forEach(p => {
                     p.tx += (width/2 - cx);
                     p.ty += (height/2 - cy);
                 });
            }
        });

        // --- Boot Sequence ---
        window.onload = async () => {
            // Ensure custom fonts are loaded to avoid layout jumps in canvas text drawing
            try {
                await document.fonts.ready;
            } catch(e) {} // Proceed anyway if api not supported
            
            resize();
            initParticles();
            
            // Hide preloader smoothly
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                // Start animation loop
                requestAnimationFrame(render);
            }, 1500);
        };

    </script>
</body>
</html>
